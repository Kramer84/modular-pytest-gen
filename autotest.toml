# autotest.toml - Modular Pytest Gen Configuration

source_root = "src"
import_prefix = "modular_pytest_gen"
global_context = []
custom_instructions = ""

[layout]
strategy = "external" 
structure = "nested"  
test_root = "tests/generated/"
granularity = "function"

[discovery]
respect_dunder_all = true
include_classes = true
max_class_lines = 300
exclude_patterns = [
    "*__init__.py",
    "build",
    "tests",
    "*test_*.py",
    "cli",
    "templates",
]
exclude_nodes = [
    "TestGenerationLayoutConfig",
    "DiscoveryConfig",
    "LLMConfig",
    "ProjectConfig",
    "DeprecationDetail",
    "ParameterDetail",
    "ReturnDetail",
    "SeeAlsoItem",
    "ExceptionDetail",
    "RoutineListingItem",
    "CoreNumPyDocstringSchema",
    "BaseNumPyDocstringSchema",
    "FunctionDocstringSchema",
    "MethodDocstringSchema",
    "ClassDocstringSchema",
    "InitMethodDocstringSchema",
    "ModuleDocstringSchema",
    "ConstantDocstringSchema",
]

[llm]
provider = "mistral"
model = "codestral-latest"
host = "https://api.mistral.ai"
structured = true
