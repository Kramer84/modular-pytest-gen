name: Sphinx Docs Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Sphinx Environment
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Build Sphinx HTML Pages
        run: |
          sphinx-build -b html docs docs/_build/html

      - name: Upload Build Artifacts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy-pages:
    environment:
      name: github-pages
      url: https://kramer84.github.io/modular-pytest-gen/
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Stream to GitHub Pages Hosting
        id: deployment
        uses: actions/deploy-pages@v4